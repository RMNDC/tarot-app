<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarot Demo</title>
    <style>
      :root {
        --bg: linear-gradient(180deg, #fff9e8 0%, #eef7ff 100%);
        --panel: #ffffff;
        --text: #24324a;
        --muted: #60708a;
        --accent: #ff8c5a;
        --accent-dark: #e46f42;
        --border: #dbe5f0;
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }

      body {
        min-height: 100vh;
        font-family: Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
        padding: 32px 16px 48px;
      }

      .page {
        max-width: 980px;
        margin: 0 auto;
      }

      .hero {
        text-align: center;
        margin-bottom: 28px;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        margin-bottom: 10px;
      }

      .hero p {
        color: var(--muted);
        max-width: 640px;
        margin: 0 auto 18px;
        line-height: 1.6;
      }

      button {
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        padding: 14px 24px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .status,
      .error {
        text-align: center;
        margin: 16px 0;
      }

      .error {
        color: #b33434;
      }

      .spread {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(36, 50, 74, 0.08);
      }

      .position {
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-dark);
        margin-bottom: 10px;
      }

      .name {
        font-size: 1.25rem;
        margin-bottom: 8px;
      }

      .orientation {
        color: var(--muted);
        font-weight: 700;
        margin-bottom: 12px;
      }

      .meaning {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>Simple Tarot Demo</h1>
        <p>
          Click the button to draw a three-card spread and display the card
          names and meanings from the Flask backend.
        </p>
        <button id="draw-btn">Draw Cards</button>
      </section>

      <p id="status" class="status"></p>
      <p id="error" class="error"></p>
      <section id="spread" class="spread"></section>
    </main>

    <script>
      const drawBtn = document.getElementById("draw-btn");
      const statusEl = document.getElementById("status");
      const errorEl = document.getElementById("error");
      const spreadEl = document.getElementById("spread");

      function renderSpread(spread) {
        spreadEl.innerHTML = spread
          .map(
            (card) => `
              <article class="card">
                <div class="position">${card.position}</div>
                <h2 class="name">${card.name}</h2>
                <p class="orientation">${card.orientation}</p>
                <p class="meaning">${card.meaning}</p>
              </article>
            `,
          )
          .join("");
      }

      async function drawCards() {
        drawBtn.disabled = true;
        statusEl.textContent = "Drawing cards...";
        errorEl.textContent = "";
        spreadEl.innerHTML = "";

        try {
          const response = await fetch("/draw");
          const data = await response.json();

          if (!response.ok || data.error) {
            throw new Error(data.error || "Could not load cards.");
          }

          renderSpread(data.spread);
          statusEl.textContent = "";
        } catch (error) {
          statusEl.textContent = "";
          errorEl.textContent = `Could not load cards: ${error.message}`;
        } finally {
          drawBtn.disabled = false;
        }
      }

      drawBtn.addEventListener("click", drawCards);
    </script>
  </body>
</html>
